name: Build & Sign Android App (APK / AAB)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Release APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Prepare Keystore
        env:
          # Use secrets if available, otherwise fallback to defaults
          STORE_PASSWORD_SECRET: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD_SECRET: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # 1. Check if a custom Keystore was provided as a Base64 string in secrets
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Custom Keystore detected. Decoding..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
          else
            # 2. Check if a physical Keystore file is already in the repository
            if [ -f "my-upload-key.jks" ]; then
              echo "Existing my-upload-key.jks found in repository."
            else
              # 3. Create a brand-new secure Keystore automatically
              echo "No Keystore found. Generating automatic Keystore for production upload..."
              
              # Set fallback passwords if secrets are not defined
              STORE_PASS=${STORE_PASSWORD_SECRET:-"fruitymerge123"}
              KEY_PASS=${KEY_PASSWORD_SECRET:-"fruitymerge123"}
              
              keytool -genkey -v \
                -keystore my-upload-key.jks \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -alias upload \
                -dname "CN=FruityMerge, OU=Android, O=AIStudio, L=Jakarta, S=DKI Jakarta, C=ID" \
                -storepass "$STORE_PASS" \
                -keypass "$KEY_PASS"
              
              echo "AUTOMATIC_KEYSTORE_CREATED=true" >> $GITHUB_ENV
            fi
          fi

      - name: Create Dummy google-services.json if missing
        run: |
          # The build requires a google-services.json for the Firebase plugins to initiate,
          # even if warnings are ignored. We generate a valid empty template if not present.
          if [ ! -f "app/google-services.json" ]; then
            echo "Creating a dummy google-services.json to satisfy compiler requirements..."
            echo '{"project_info":{"project_number":"123456789","project_id":"dummy-id","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.aistudio.fruitymerge.qvzxwb"}},"api_key":[{"current_key":"dummy-key-value"}]}]}' > app/google-services.json
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: "../my-upload-key.jks" # Relative to /app module
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'fruitymerge123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'fruitymerge123' }}
        run: ./gradlew assembleRelease

      - name: Build Release AAB (Android App Bundle for Google Play)
        env:
          KEYSTORE_PATH: "../my-upload-key.jks" # Relative to /app module
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'fruitymerge123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'fruitymerge123' }}
        run: ./gradlew bundleRelease

      - name: Archive Production Keystore
        # We upload the generated keystore so the user can download and save it safely.
        # This is critical because Google Play requires the identical keystore for all updates!
        uses: actions/upload-artifact@v4
        with:
          name: google-play-upload-key
          path: my-upload-key.jks
          retention-days: 90

      - name: Archive Production APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: fruity-merge-production-builds
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
